name: Bug Report
description: Report a bug in the ingestion pipeline, API, or frontend.
title: "[Bug] "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in all sections so we can reproduce and fix the issue quickly.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the system is affected?
      options:
        - Backend — Ingestion / Worker
        - Backend — API (Jobs.Api)
        - Backend — Database / EF Core
        - Backend — Meilisearch / Search
        - Frontend — UI
        - Frontend — BFF Route Handlers
        - Infrastructure / Docker
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect?
      placeholder: |
        When running `dotnet run --project src/backend/Jobs.Worker -- --run-once --source=InfoJobs`,
        the worker crashes with NullReferenceException at IngestionPipeline.cs:42.
        Expected: jobs are saved to the database.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. `docker compose up -d`
        2. `dotnet run --project src/backend/Jobs.Worker -- --run-once --source=InfoJobs`
        3. Observe the exception in the logs
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste relevant log output or stack trace. This will be formatted as code automatically.
      render: text

  - type: input
    id: dotnet-version
    attributes:
      label: .NET version
      placeholder: e.g. 8.0.200
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node.js version (if frontend bug)
      placeholder: e.g. 20.11.0
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I can reproduce this issue consistently.
          required: false
