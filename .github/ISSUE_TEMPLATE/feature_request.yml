name: Feature Request
description: Propose a new feature or improvement.
title: "[Feature] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check the [roadmap](../../docs/09_roadmap.md) to see if this is already planned.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New job source / connector
        - Ingestion Pipeline
        - API
        - Search / Ranking / Deduplication
        - Frontend
        - Infrastructure / DevOps
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like. Include relevant design decisions if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other solutions you've considered?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is consistent with the domain model in `docs/02_domain_model.md`.
          required: false
