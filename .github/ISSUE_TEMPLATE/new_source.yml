name: New Job Source
description: Request or track the addition of a new job source or source-family configuration.
title: "[Source] Add <SourceName>"
labels: ["new-source", "enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose or track a new job source.
        Check first whether it fits an existing family such as `CorporateCareers`, `JsonLd`, or `GupyCompanies`.
        Please read `docs/04_ingestion_sources.md` and `docs/PROJECT_RULES.md` before submitting.

  - type: input
    id: source-name
    attributes:
      label: Source name
      description: Human-readable name of the job board or company source.
      placeholder: e.g. Greenhouse
    validations:
      required: true

  - type: input
    id: base-url
    attributes:
      label: Base URL
      placeholder: e.g. https://boards.greenhouse.io
    validations:
      required: true

  - type: dropdown
    id: response-format
    attributes:
      label: Response format
      options:
        - Existing source family
        - JSON API
        - HTML (scraping)
        - JSON-LD
        - Workday
        - Gupy
        - Other
    validations:
      required: true

  - type: textarea
    id: fit
    attributes:
      label: Existing family fit
      description: Does this source fit an existing family or parser already present in the repository?
      placeholder: e.g. Fits GupyCompanies; only needs CompanyBaseUrl and fixtures

  - type: textarea
    id: pagination
    attributes:
      label: Pagination strategy
      description: How does the source expose multiple pages? (e.g., offset/limit, cursor, page number)

  - type: textarea
    id: sample
    attributes:
      label: Sample response
      description: |
        Paste a representative JSON or HTML snippet (anonymise any real data).
        This will become the fixture in `src/backend/tests/fixtures/` and `docs/samples/`.
      render: json

  - type: checkboxes
    id: checklist
    attributes:
      label: Implementation checklist (for the developer picking this up)
      options:
        - label: "Existing family reused or a new connector justified explicitly"
        - label: "Configuration kept aligned in Jobs.Api and Jobs.Worker when needed"
        - label: "Fixture added to `src/backend/tests/fixtures/`"
        - label: "Docs or sample updated when useful"
        - label: "xUnit coverage added or expanded"
        - label: "Tested with `--run-once --source=<Name>`"
