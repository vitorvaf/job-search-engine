name: New Job Source
description: Request or track the addition of a new job board connector.
title: "[Source] Add <SourceName> connector"
labels: ["new-source", "enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose or track a new `IJobSource` connector.
        Please read `docs/04_ingestion_sources.md` and `docs/PROJECT_RULES.md` before submitting.

  - type: input
    id: source-name
    attributes:
      label: Source name
      description: Human-readable name of the job board (matches the `Name` property of `IJobSource`).
      placeholder: e.g. Greenhouse
    validations:
      required: true

  - type: input
    id: base-url
    attributes:
      label: Base URL
      placeholder: e.g. https://boards.greenhouse.io
    validations:
      required: true

  - type: dropdown
    id: response-format
    attributes:
      label: Response format
      options:
        - JSON API
        - HTML (scraping)
        - JSON-LD
        - Workday
        - Gupy
        - Other
    validations:
      required: true

  - type: textarea
    id: pagination
    attributes:
      label: Pagination strategy
      description: How does the source expose multiple pages? (e.g., offset/limit, cursor, page number)

  - type: textarea
    id: sample
    attributes:
      label: Sample response
      description: |
        Paste a representative JSON or HTML snippet (anonymise any real data).
        This will become the fixture in `src/backend/tests/fixtures/` and `docs/samples/`.
      render: json

  - type: checkboxes
    id: checklist
    attributes:
      label: Implementation checklist (for the developer picking this up)
      options:
        - label: "`<Name>JobSource.cs` created in `Jobs.Infrastructure/Ingestion/`"
        - label: "Registered in `DependencyInjection.cs`"
        - label: "Fixture added to `src/backend/tests/fixtures/`"
        - label: "Sample added to `docs/samples/`"
        - label: "xUnit test covering happy-path parse added"
        - label: "Rate limit respected via `IngestionFetchOptions`"
        - label: "Tested with `--run-once --source=<Name>`"
