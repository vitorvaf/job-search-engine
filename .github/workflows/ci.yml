name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Backend: build + test
  # ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/backend/Jobs.sln

      - name: Check formatting
        run: dotnet format src/backend/Jobs.sln --verify-no-changes --no-restore

      - name: Build (Release)
        run: dotnet build src/backend/Jobs.sln --configuration Release --no-restore --warnaserror

      - name: Run unit tests
        run: |
          dotnet test src/backend/Jobs.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: ./coverage

  # ──────────────────────────────────────────────────────────────
  # Frontend: lint + build
  # ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js 15)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Provide a dummy URL so the build does not fail on missing env var.
          # Real secrets must be set via GitHub Environment secrets for deployments.
          BACKEND_URL: http://localhost:5004
