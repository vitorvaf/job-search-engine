services:
  postgres:
    image: postgres:16
    container_name: jobs_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobs}
      POSTGRES_USER: ${POSTGRES_USER:-jobs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobs}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobs} -d ${POSTGRES_DB:-jobs}"]
      interval: 5s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:4
    container_name: jobs_adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: jobs_meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev_master_key_change_me}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: jobs_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: jobs_mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api.dev
    container_name: jobs_api
    command: ["dotnet", "watch", "--non-interactive", "--project", "Jobs.Api", "run", "--no-launch-profile"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5004
      ConnectionStrings__JobsDb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-jobs};Username=${POSTGRES_USER:-jobs};Password=${POSTGRES_PASSWORD:-jobs}
      Meilisearch__BaseUrl: http://meilisearch:7700
      Meilisearch__MasterKey: ${MEILI_MASTER_KEY:-dev_master_key_change_me}
      App__Auth__BffInternalApiKey: ${AUTH_BFF_INTERNAL_API_KEY:-dev_internal_key_change_me}
      App__Auth__Tokens__EmailVerificationMinutes: 1440
      App__Auth__Tokens__PasswordResetMinutes: 30
      App__PublicUrls__FrontendBaseUrl: http://localhost:3000
      App__Email__FromName: Jobs
      App__Email__FromAddress: no-reply@job-search.local
      App__Email__Smtp__Host: mailpit
      App__Email__Smtp__Port: 1025
      App__Email__Smtp__UseSsl: "false"
    volumes:
      - ./src:/workspace/src
    ports:
      - "5004:5004"
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      mailpit:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker.dev
    container_name: jobs_worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__JobsDb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-jobs};Username=${POSTGRES_USER:-jobs};Password=${POSTGRES_PASSWORD:-jobs}
      Meilisearch__BaseUrl: http://meilisearch:7700
      Meilisearch__MasterKey: ${MEILI_MASTER_KEY:-dev_master_key_change_me}
    volumes:
      - ./src:/workspace/src
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.dev
    container_name: jobs_frontend
    environment:
      BACKEND_URL: http://api:5004
      BACKEND_INTERNAL_API_KEY: ${AUTH_BFF_INTERNAL_API_KEY:-dev_internal_key_change_me}
      AUTH_SECRET: ${AUTH_SECRET:-dev_auth_secret_change_me}
      NEXTAUTH_SECRET: ${AUTH_SECRET:-dev_auth_secret_change_me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # Enable file-change polling so hot reload works inside the container
      WATCHPACK_POLLING: "true"
    volumes:
      - ./src/frontend:/app
      # Preserve the node_modules installed at image-build time;
      # the bind mount above must not overwrite them.
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pg_data:
  meili_data:
  redis_data:
  frontend_node_modules:
